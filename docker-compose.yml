version: '3.8'

services:
  web:
    image: rakadarma/smb-garasibmw:latest  
    container_name: laravel_app
    ports:
      - "8000:80"
    environment:
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=garasibmw_db
      - DB_USERNAME=root
      - DB_PASSWORD=secret
    depends_on:
      - db

  db:
    image: mysql:8.0  
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_DATABASE: garasibmw_db
      MYSQL_ROOT_PASSWORD: secret
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data: